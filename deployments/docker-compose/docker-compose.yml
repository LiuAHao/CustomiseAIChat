version: "3.9"

services:
  api:
    image: golang:1.24
    working_dir: /workspace
    command: ["go", "run", "./cmd/api"]
    environment:
      HTTP_ADDR: ":8081"
      WORKER_POLL_INTERVAL: "5s"
      JWT_SECRET: "dev-secret"
      SEED_ADMIN_EMAIL: "admin@example.com"
      SEED_ADMIN_PASSWORD: "ChangeMe123!"
      STORAGE_DRIVER: "postgres"
      POSTGRES_DSN: "postgres://agent:agent@postgres:5432/agent_platform?sslmode=disable"
      POSTGRES_AUTO_MIGRATE: "true"
    volumes:
      - ../../:/workspace
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis

  worker:
    image: golang:1.24
    working_dir: /workspace
    command: ["go", "run", "./cmd/worker"]
    environment:
      WORKER_POLL_INTERVAL: "5s"
      STORAGE_DRIVER: "postgres"
      POSTGRES_DSN: "postgres://agent:agent@postgres:5432/agent_platform?sslmode=disable"
      POSTGRES_AUTO_MIGRATE: "true"
    volumes:
      - ../../:/workspace
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
